version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: vibe-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  comfyui:
    image: ghcr.io/comfyanonymous/comfyui:latest
    container_name: vibe-comfyui
    ports:
      - "8188:8188"
    restart: unless-stopped

  godot_headless_461:
    image: barichello/godot-ci:4.6.1
    container_name: vibe-godot-461
    working_dir: /workspace
    entrypoint: ["godot"]
    command: ["--version"]
    volumes:
      - ./vibe-game-engine:/workspace

  bridge_service:
    image: python:3.12-slim
    container_name: vibe-bridge-service
    working_dir: /workspace/godot-bridge-mcp-public/mcp-server
    command: ["python", "-m", "http.server", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace

volumes:
  ollama_data:
